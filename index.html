<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a16">
<title>TempoGuess — Master Your Inner Clock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --accent:#8b5cf6; --accent2:#6366f1; --accent3:#38bdf8;
  --grad:linear-gradient(135deg,#8b5cf6 0%,#6366f1 50%,#3b82f6 100%);
  --bg:#0a0a16; --bg2:#11122a;
  --surface:rgba(255,255,255,.055); --surface2:rgba(255,255,255,.09);
  --line:rgba(255,255,255,.10); --line2:rgba(255,255,255,.18);
  --text:#f4f5ff; --muted:#9aa0bf; --faint:#5d6280;
  --good:#34d399; --bad:#f87171; --gold:#fbbf24;
  --shadow:0 18px 50px rgba(0,0,0,.45);
  --r:24px;
  --spring:cubic-bezier(.34,1.45,.64,1);
}
[data-appearance="light"]{
  --bg:#eceefb; --bg2:#e2e5fa;
  --surface:rgba(255,255,255,.62); --surface2:rgba(255,255,255,.85);
  --line:rgba(40,40,90,.10); --line2:rgba(40,40,90,.16);
  --text:#15162e; --muted:#5b6080; --faint:#9aa0bf;
  --shadow:0 18px 44px rgba(80,80,160,.18);
}
[data-theme="sunset"]{--accent:#fb7185;--accent2:#f97316;--accent3:#fbbf24;--grad:linear-gradient(135deg,#fb7185,#f97316,#fbbf24)}
[data-theme="emerald"]{--accent:#10b981;--accent2:#14b8a6;--accent3:#38bdf8;--grad:linear-gradient(135deg,#10b981,#14b8a6,#0ea5e9)}
[data-theme="crimson"]{--accent:#ef4444;--accent2:#dc2626;--accent3:#fb7185;--grad:linear-gradient(135deg,#ef4444,#e11d48,#fb7185)}
[data-theme="mono"]{--accent:#e5e7eb;--accent2:#9ca3af;--accent3:#f9fafb;--grad:linear-gradient(135deg,#f9fafb,#9ca3af,#4b5563)}
[data-theme="royal"]{--accent:#fbbf24;--accent2:#8b5cf6;--accent3:#f59e0b;--grad:linear-gradient(135deg,#fbbf24,#a855f7,#6d28d9)}
[data-theme="obsidian"]{--accent:#a3a3a3;--accent2:#fbbf24;--accent3:#fde68a;--grad:linear-gradient(135deg,#262626,#525252,#fbbf24)}
[data-theme="prism"]{--accent:#f472b6;--accent2:#38bdf8;--accent3:#a3e635;--grad:linear-gradient(135deg,#f472b6,#8b5cf6,#38bdf8,#a3e635)}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
  background:#04040a; color:var(--text);
  overflow:hidden; touch-action:manipulation;
  -webkit-font-smoothing:antialiased; user-select:none;
}
#phone{
  position:relative; margin:0 auto; height:100dvh; max-width:430px; width:100%;
  background:var(--bg); color:var(--text); overflow:hidden;
  transition:background .4s;
}
@media(min-width:520px){ #phone{height:min(880px,96dvh); margin-top:max(0px,calc((100dvh - min(880px,96dvh))/2)); border-radius:46px; border:1px solid rgba(255,255,255,.09); box-shadow:0 40px 120px rgba(0,0,0,.7)} body{display:flex;align-items:flex-start;justify-content:center} }

/* ambient blobs — intentionally slow & non-periodic (anti count-along) */
.blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5;pointer-events:none;z-index:0}
.b1{width:300px;height:300px;background:var(--accent);top:-100px;left:-80px;animation:drift1 23s ease-in-out infinite alternate}
.b2{width:260px;height:260px;background:var(--accent2);bottom:-60px;right:-90px;animation:drift2 31s ease-in-out infinite alternate}
.b3{width:180px;height:180px;background:var(--accent3);top:40%;left:60%;opacity:.28;animation:drift1 41s ease-in-out infinite alternate-reverse}
[data-appearance="light"] .blob{opacity:.30}
@keyframes drift1{to{transform:translate(60px,80px) scale(1.15)}}
@keyframes drift2{to{transform:translate(-70px,-60px) scale(.9)}}
[data-motion="reduce"] *{animation-duration:.001s !important; transition-duration:.05s !important}

/* ============ LAYOUT ============ */
.screen{position:absolute;inset:0;z-index:2;display:none;flex-direction:column;overflow-y:auto;overflow-x:hidden;padding:max(14px,env(safe-area-inset-top)) 18px 0;scrollbar-width:none}
.screen::-webkit-scrollbar{display:none}
.screen.active{display:flex;animation:screenIn .38s var(--spring)}
@keyframes screenIn{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}
.pad-tabs{padding-bottom:140px}

.glass{background:var(--surface);backdrop-filter:blur(24px) saturate(1.6);-webkit-backdrop-filter:blur(24px) saturate(1.6);border:1px solid var(--line);border-radius:var(--r)}
.glass2{background:var(--surface2)}

h1{font-size:26px;font-weight:800;letter-spacing:-.5px}
.sub{color:var(--muted);font-size:13px;font-weight:500}
.section-t{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin:22px 4px 10px}

button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:15px 20px;border-radius:18px;font-size:16px;font-weight:700;transition:transform .15s var(--spring),opacity .2s;width:100%}
.btn:active{transform:scale(.96)}
.btn-grad{background:var(--grad);color:#fff;box-shadow:0 8px 24px color-mix(in srgb,var(--accent) 40%,transparent)}
.btn-ghost{background:var(--surface2);border:1px solid var(--line)}
.btn-sm{padding:10px 16px;font-size:14px;width:auto;border-radius:14px}
.iconbtn{width:40px;height:40px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--line);font-size:16px;transition:transform .15s}
.iconbtn:active{transform:scale(.9)}
.hidden{display:none !important}

/* ============ HEADER ============ */
.tophead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.brand{font-size:21px;font-weight:900;letter-spacing:-.6px;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.headr{display:flex;gap:8px;align-items:center}
.streakpill{display:flex;align-items:center;gap:5px;padding:8px 12px;border-radius:14px;background:var(--surface2);border:1px solid var(--line);font-size:13px;font-weight:800}

/* level card */
.lvlcard{display:flex;align-items:center;gap:14px;padding:14px 16px;margin-bottom:6px}
.avatar{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;background:var(--surface2);position:relative;flex-shrink:0}
.ring{position:absolute;inset:-4px;border-radius:50%;padding:3px;pointer-events:none}
.ring.none{display:none}
.ring.bronze{background:linear-gradient(135deg,#b87333,#8b5a2b)}
.ring.silver{background:linear-gradient(135deg,#e5e7eb,#9ca3af)}
.ring.gold{background:linear-gradient(135deg,#fde68a,#f59e0b)}
.ring.diamond{background:conic-gradient(#38bdf8,#a78bfa,#f0abfc,#38bdf8);animation:spinring 4s linear infinite}
.ring.royalty{background:conic-gradient(#fbbf24,#a855f7,#fbbf24);animation:spinring 3s linear infinite}
@keyframes spinring{to{transform:rotate(360deg)}}
.ring::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--bg)}
.ring,.ring::after{z-index:0}
.avatar span{position:relative;z-index:1}
.lvlinfo{flex:1;min-width:0}
.lvlname{font-weight:800;font-size:16px;display:flex;align-items:center;gap:7px}
.lvltitle{font-size:11px;font-weight:700;color:var(--accent3);text-transform:uppercase;letter-spacing:.8px}
.xpbar{height:7px;border-radius:99px;background:var(--surface2);margin-top:7px;overflow:hidden}
.xpfill{height:100%;border-radius:99px;background:var(--grad);transition:width .8s var(--spring)}
.lvlnum{font-size:12px;color:var(--muted);font-weight:600;margin-top:5px}

/* ============ MODE GRID ============ */
.modegrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modecard{padding:16px 14px;text-align:left;transition:transform .15s var(--spring);position:relative;overflow:hidden}
.modecard:active{transform:scale(.96)}
.modecard .mi{font-size:26px;display:block;margin-bottom:8px}
.modecard .mn{font-weight:800;font-size:15px}
.modecard .md{font-size:11.5px;color:var(--muted);font-weight:500;margin-top:2px}
.modecard.feature{grid-column:1 / -1;display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 22%,transparent),color-mix(in srgb,var(--accent3) 10%,transparent)),var(--surface)}
.modecard.feature .mi{margin:0;font-size:32px}
.modecard.wide{grid-column:1 / -1;display:flex;align-items:center;gap:14px}
.modecard.wide .mi{margin:0;font-size:28px}
.tagdone{position:absolute;top:10px;right:10px;font-size:10px;font-weight:800;background:var(--good);color:#06281c;padding:3px 8px;border-radius:99px}
.tagnew{position:absolute;top:10px;right:10px;font-size:10px;font-weight:800;background:var(--grad);color:#fff;padding:3px 8px;border-radius:99px}

/* ============ GAME ============ */
#scr-game{padding:max(14px,env(safe-area-inset-top)) 22px 30px;background:radial-gradient(120% 90% at 50% 0%,color-mix(in srgb,var(--accent2) 14%,transparent),transparent 60%)}
.ghead{display:flex;align-items:center;justify-content:space-between}
.gmode{font-weight:800;font-size:15px}
.ground{font-size:12px;font-weight:700;color:var(--muted);min-width:40px;text-align:right}
.gbody{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px}
.pbanner{padding:9px 18px;border-radius:99px;font-weight:800;font-size:14px;background:var(--surface2);border:1px solid var(--line2)}
.targetwrap{padding:26px 44px;text-align:center;min-width:230px;transition:filter .5s,opacity .5s}
.targetwrap.veiled .tnum{filter:blur(18px);opacity:.35}
.tlabel{font-size:11px;font-weight:800;letter-spacing:2.5px;color:var(--muted)}
.tnum{font-size:74px;font-weight:900;letter-spacing:-3px;line-height:1.05;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-variant-numeric:tabular-nums;transition:filter .5s,opacity .5s}
.tunit{font-size:22px;font-weight:700;letter-spacing:0;margin-left:4px}
.ghint{color:var(--muted);font-size:13.5px;font-weight:500;text-align:center;max-width:280px;line-height:1.5;min-height:40px}
.runningdots{display:inline-flex;gap:5px;margin-left:6px}
.runningdots i{width:5px;height:5px;border-radius:50%;background:var(--accent3);animation:dotf 1.7s ease-in-out infinite}
.runningdots i:nth-child(2){animation-delay:.43s}.runningdots i:nth-child(3){animation-delay:.97s}
@keyframes dotf{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}

.bigbtn{width:190px;height:190px;border-radius:50%;font-size:27px;font-weight:900;letter-spacing:1px;color:#fff;position:relative;transition:transform .14s var(--spring);background:var(--grad);box-shadow:0 14px 50px color-mix(in srgb,var(--accent) 45%,transparent), inset 0 2px 8px rgba(255,255,255,.3)}
.bigbtn:active{transform:scale(.92)}
.bigbtn::before{content:'';position:absolute;inset:-12px;border-radius:50%;border:2px solid color-mix(in srgb,var(--accent) 45%,transparent)}
.bigbtn.stop{background:linear-gradient(135deg,#f43f5e,#e11d48,#be123c);box-shadow:0 14px 50px rgba(244,63,94,.45), inset 0 2px 8px rgba(255,255,255,.25)}
.bigbtn.stop::before{border-color:rgba(244,63,94,.5);animation:breath 3.3s ease-in-out infinite}
@keyframes breath{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.06);opacity:.4}}
[data-button="neon"] .bigbtn{background:#0c0c1e;border:2px solid var(--accent);box-shadow:0 0 34px var(--accent),inset 0 0 26px color-mix(in srgb,var(--accent) 35%,transparent);color:var(--accent3)}
[data-button="neon"] .bigbtn.stop{background:#1e0c12;border-color:#f43f5e;box-shadow:0 0 34px #f43f5e,inset 0 0 26px rgba(244,63,94,.3);color:#fda4af}
[data-button="retro"] .bigbtn{border-radius:38px;background:var(--accent);box-shadow:0 9px 0 color-mix(in srgb,var(--accent2) 70%,#000)}
[data-button="retro"] .bigbtn:active{transform:translateY(6px)}
[data-button="retro"] .bigbtn.stop{background:#e11d48;box-shadow:0 9px 0 #881337}
[data-button="minimal"] .bigbtn{background:var(--surface2);border:1.5px solid var(--line2);color:var(--text);box-shadow:none}
[data-button="minimal"] .bigbtn.stop{background:rgba(244,63,94,.18);border-color:#f43f5e;color:#fda4af}
.combo{font-size:14px;font-weight:900;color:var(--gold);letter-spacing:.5px;animation:popIn .4s var(--spring)}

/* round flash */
.roundflash{position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:color-mix(in srgb,var(--bg) 72%,transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);animation:popIn .3s var(--spring)}
.roundflash .rfrank{font-size:50px}
.roundflash .rfscore{font-size:30px;font-weight:900}
.roundflash .rfsub{color:var(--muted);font-weight:600;font-size:14px}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}

/* ============ RESULTS SHEET ============ */
.sheetwrap{position:absolute;inset:0;z-index:50;display:none;align-items:flex-end;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.sheetwrap.open{display:flex}
.sheet{width:100%;max-height:88%;overflow-y:auto;background:var(--bg2);border-radius:34px 34px 0 0;border-top:1px solid var(--line2);padding:14px 22px calc(26px + env(safe-area-inset-bottom));animation:sheetUp .5s var(--spring);scrollbar-width:none}
.sheet::-webkit-scrollbar{display:none}
@keyframes sheetUp{from{transform:translateY(70%)}to{transform:none}}
.grab{width:42px;height:5px;border-radius:99px;background:var(--line2);margin:0 auto 16px}
.rankbig{text-align:center;margin:4px 0 2px}
.rankbig .remoji{font-size:62px;display:block;animation:rankPop .65s var(--spring)}
@keyframes rankPop{0%{transform:scale(0) rotate(-16deg)}60%{transform:scale(1.18)}100%{transform:scale(1)}}
.rankname{font-size:24px;font-weight:900;letter-spacing:-.4px;margin-top:4px}
.nearmiss{text-align:center;font-size:13px;font-weight:700;color:var(--gold);margin-top:5px;min-height:18px}
.scorebig{text-align:center;margin:14px 0 4px}
.scorenum{font-size:62px;font-weight:900;letter-spacing:-2.5px;font-variant-numeric:tabular-nums;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.scorelbl{font-size:12px;font-weight:800;letter-spacing:2px;color:var(--muted)}
.resrows{display:flex;flex-direction:column;gap:9px;margin:16px 0}
.resrow{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-radius:16px;background:var(--surface);border:1px solid var(--line);opacity:0;animation:rowIn .45s var(--spring) forwards}
.resrow:nth-child(2){animation-delay:.12s}.resrow:nth-child(3){animation-delay:.24s}.resrow:nth-child(4){animation-delay:.36s}
@keyframes rowIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}
.resrow .rl{color:var(--muted);font-weight:600;font-size:13.5px}
.resrow .rv{font-weight:800;font-size:16px;font-variant-numeric:tabular-nums}
.xpgain{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:16px;background:color-mix(in srgb,var(--accent) 14%,transparent);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);margin-bottom:14px}
.xpgain .xv{font-weight:900;font-size:17px;color:var(--accent3)}
.coach{font-size:12.5px;color:var(--muted);text-align:center;margin:2px 0 12px;line-height:1.5;min-height:0}
.sheetbtns{display:flex;flex-direction:column;gap:10px}
.btnrow{display:flex;gap:10px}
.btnrow .btn{flex:1}
.pbflag{text-align:center;color:var(--good);font-weight:800;font-size:13px;margin-bottom:8px}

/* rounds list (rush) */
.roundlist{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:10px 0 4px}
.rdot{width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--surface2);border:1px solid var(--line)}

/* ============ STATS / PROFILE ============ */
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.stattile{padding:15px 16px}
.stattile .sv{font-size:23px;font-weight:900;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.stattile .sl{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:3px}
.heatwrap{padding:16px;overflow-x:auto}
.heatmap{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,12px);gap:3.5px;width:max-content}
.hcell{width:12px;height:12px;border-radius:3.5px;background:var(--surface2)}
.hcell.l1{background:color-mix(in srgb,var(--accent) 30%,transparent)}
.hcell.l2{background:color-mix(in srgb,var(--accent) 55%,transparent)}
.hcell.l3{background:color-mix(in srgb,var(--accent) 80%,transparent)}
.hcell.l4{background:var(--accent3)}
.achrow{display:flex;align-items:center;gap:13px;padding:13px 15px;border-radius:18px;margin-bottom:9px}
.achrow .ai{font-size:25px;width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:var(--surface2);flex-shrink:0}
.achrow.locked{opacity:.42;filter:grayscale(.8)}
.achrow .an{font-weight:800;font-size:14.5px}
.achrow .ad{font-size:12px;color:var(--muted);margin-top:1px}
.achrow .ac{margin-left:auto;font-size:18px}

/* ============ DAILY ============ */
.dailyhero{padding:22px;text-align:center;background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 24%,transparent),color-mix(in srgb,var(--accent3) 10%,transparent)),var(--surface)}
.dailyhero .dt{font-size:46px;font-weight:900;letter-spacing:-1.5px;margin:6px 0}
.cdown{font-size:12px;color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums}
.lbrow{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:15px;margin-bottom:7px;background:var(--surface);border:1px solid var(--line)}
.lbrow.me{background:color-mix(in srgb,var(--accent) 18%,transparent);border-color:color-mix(in srgb,var(--accent) 40%,transparent)}
.lbrow .pos{width:26px;font-weight:900;font-size:14px;color:var(--muted);text-align:center}
.lbrow .nm{flex:1;font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lbrow .df{font-size:12.5px;color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums}
.questrow{display:flex;align-items:center;gap:12px;padding:14px 15px;border-radius:18px;margin-bottom:9px}
.questrow .qi{font-size:22px}
.questrow .qn{font-weight:700;font-size:13.5px;flex:1}
.qbar{height:5px;border-radius:99px;background:var(--surface2);margin-top:6px;overflow:hidden}
.qfill{height:100%;background:var(--grad);border-radius:99px;transition:width .5s}
.qxp{font-size:12px;font-weight:800;color:var(--accent3);white-space:nowrap}
.loginstrip{display:flex;gap:7px}
.lday{flex:1;padding:10px 2px;border-radius:13px;text-align:center;background:var(--surface);border:1px solid var(--line)}
.lday .ldn{font-size:9.5px;font-weight:800;color:var(--muted)}
.lday .ldx{font-size:11.5px;font-weight:900;margin-top:3px}
.lday.claimed{background:color-mix(in srgb,var(--good) 18%,transparent);border-color:color-mix(in srgb,var(--good) 40%,transparent)}
.lday.today{border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 40%,transparent)}

/* ============ LOCKER ============ */
.chipgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.chip{aspect-ratio:1;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:var(--surface);border:1.5px solid var(--line);font-size:24px;position:relative;transition:transform .15s var(--spring)}
.chip:active{transform:scale(.92)}
.chip.on{border-color:var(--accent);box-shadow:0 0 0 2.5px color-mix(in srgb,var(--accent) 45%,transparent);background:color-mix(in srgb,var(--accent) 14%,transparent)}
.chip.lock{opacity:.4}
.chip small{font-size:9px;font-weight:800;color:var(--muted);letter-spacing:.2px}
.chip .lvlreq{position:absolute;bottom:5px;font-size:8.5px;font-weight:900;color:var(--gold)}
.chip.wide{aspect-ratio:auto;padding:13px 4px}
.swatch{width:26px;height:26px;border-radius:9px}

/* ============ TABBAR / ADS ============ */

.banner{position:absolute;left:14px;right:14px;bottom:86px;z-index:29;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:16px;background:var(--surface2);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--line);font-size:12px}
.banner .adtag{font-size:9px;font-weight:900;background:var(--faint);color:var(--bg);padding:2px 6px;border-radius:6px}

/* ============ MODALS / TOASTS ============ */
.modal{position:absolute;inset:0;z-index:60;display:none;align-items:center;justify-content:center;padding:26px;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}

.mcard{width:100%;max-height:86%;overflow-y:auto;background:var(--bg2);border:1px solid var(--line2);border-radius:30px;padding:24px;animation:popIn .35s var(--spring);scrollbar-width:none}
.mcard::-webkit-scrollbar{display:none}
.mtitle{font-size:20px;font-weight:900;letter-spacing:-.3px;margin-bottom:4px}
.setrow{display:flex;align-items:center;justify-content:space-between;padding:13px 2px;border-bottom:1px solid var(--line)}
.setrow:last-of-type{border-bottom:none}
.setrow .sn{font-weight:700;font-size:14.5px}
.setrow .sd{font-size:11.5px;color:var(--muted);margin-top:1px}
.toggle{width:50px;height:30px;border-radius:99px;background:var(--surface2);border:1px solid var(--line2);position:relative;transition:background .25s;flex-shrink:0}
.toggle::after{content:'';position:absolute;top:2.5px;left:3px;width:23px;height:23px;border-radius:50%;background:#fff;transition:transform .25s var(--spring);box-shadow:0 2px 6px rgba(0,0,0,.3)}
.toggle.on{background:var(--accent)}
.toggle.on::after{transform:translateX(20px)}
.seg{display:flex;background:var(--surface2);border-radius:13px;padding:3px;gap:3px}
.seg button{flex:1;padding:7px 10px;border-radius:10px;font-size:12px;font-weight:700;color:var(--muted)}
.seg button.on{background:var(--accent);color:#fff}
#toasts{position:absolute;top:max(16px,env(safe-area-inset-top));left:16px;right:16px;z-index:90;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:13px 17px;border-radius:17px;background:var(--surface2);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--line2);font-size:13.5px;font-weight:700;display:flex;gap:10px;align-items:center;box-shadow:var(--shadow);animation:toastIn .4s var(--spring)}
@keyframes toastIn{from{opacity:0;transform:translateY(-16px) scale(.92)}to{opacity:1;transform:none}}
.toast.out{transition:.3s;opacity:0;transform:translateY(-10px)}

/* ad modal */
.adbox{height:230px;border-radius:20px;background:linear-gradient(135deg,#312e81,#6d28d9,#0ea5e9);background-size:300% 300%;animation:adshine 3s ease infinite;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#fff;margin:14px 0}

/* winner */

@keyframes shakeit{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}50%{transform:translateX(6px)}75%{transform:translateX(-3px)}}
</style>
</head>

<script>
'use strict';
/* =================================================================
   TempoGuess — single-file game. State, audio, game loop, UI.
================================================================= */
const $ = id => document.getElementById(id);
const phone = $('phone');
const clamp = (v,a,b)=>Math.min(b,Math.max(a,v));
const fmtS = n => (Math.round(n*1000)/1000).toFixed(n<10?2:2);
const todayStr = (d=new Date()) => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const hourKey = () => todayStr()+'@'+new Date().getHours();
function hashStr(s){let h=1779033703^s.length;for(let i=0;i<s.length;i++){h=Math.imul(h^s.charCodeAt(i),3432918353);h=h<<13|h>>>19}return h>>>0}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const esc = s => String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ============ HAPTICS & SOUND ============ */
const CAP = () => (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()) ? window.Capacitor : null;
function buzz(p){
  if(!S.settings.haptics) return;
  const C=CAP();
  if(C){ // native iOS: real UIKit haptics via Capacitor
    try{
      const H=C.Plugins.Haptics;
      if(Array.isArray(p)&&p.length>=4) H.notification({type:'SUCCESS'});
      else H.impact({style:Array.isArray(p)?'HEAVY':(p>=25?'MEDIUM':'LIGHT')});
    }catch(e){}
    return;
  }
  if(navigator.vibrate) try{navigator.vibrate(p)}catch(e){}
}
let AC=null;
const SOUNDPACKS = {
  classic:{wave:'sine', mult:1, name:'Classic'},
  arcade:{wave:'square', mult:1.25, name:'Arcade'},
  synth:{wave:'sawtooth', mult:.8, name:'Synth'},
  zen:{wave:'sine', mult:.55, name:'Zen'},
};
function tone(f,dur=.12,delay=0,vol=.16){
  if(!S.settings.sound) return;
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    const p = SOUNDPACKS[S.equipped.sound]||SOUNDPACKS.classic;
    const t = AC.currentTime+delay, o=AC.createOscillator(), g=AC.createGain();
    o.type=p.wave; o.frequency.value=f*p.mult;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+.012); g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+dur+.05);
  }catch(e){}
}
const sfx = {
  tap:()=>{tone(560,.07)}, start:()=>{tone(720,.1);tone(960,.12,.08)}, stop:()=>{tone(420,.14)},
  win:()=>{[660,830,990,1320].forEach((f,i)=>tone(f,.16,i*.09))},
  ok:()=>{[520,720].forEach((f,i)=>tone(f,.12,i*.08))},
  fail:()=>{tone(260,.22);tone(180,.3,.12)},
  level:()=>{[523,659,784,1046,1318].forEach((f,i)=>tone(f,.18,i*.1,.2))},
  unlock:()=>{[880,1100,1460].forEach((f,i)=>tone(f,.13,i*.07))},
  rank:(name)=>{
    if(name==='Missed'){tone(260,.22);tone(180,.3,.12);return}
    const T={Diamond:[660,830,990,1320,1760],Platinum:[587,740,880,1175],Gold:[523,659,784],Silver:[523,659],Bronze:[440]};
    (T[name]||[440]).forEach((f,i)=>tone(f,.16,i*.09));
  },
};

/* ============ STATE ============ */
const SKEY='tempoguess_v1';
const DEFAULTS = {
  name:'Player', onboarded:false, premium:false, installDay:todayStr(),
  totalScore:0, gamesPlayed:0, sumAcc:0, bestDiff:null, bestScore:0, perfects:0, rushBest:0, shares:0, diamondRow:0, playsSinceAd:0,
  totalXP:0, dailyWins:0, dailyTop10:0,
  streak:{cur:0,longest:0,last:null},
  login:{streak:0,last:null},
  gamesByDate:{}, recentErrs:[], modePlays:{},
  achievements:{},
  daily:{date:null,done:false,diff:0,score:0,pos:0},
  world:{key:null,done:false,pct:0},
  quests:{date:null,list:[]},
  equipped:{theme:'aurora',avatar:'⏱️',border:'none',sound:'classic',button:'glass',badge:null,fx:'confetti'},
  settings:{haptics:true,sound:true,appearance:'auto',motion:'full'},
  analytics:{sessions:0,timeSec:0,adsShown:0,adsDone:0,events:[]},
};
function deepMerge(base,over){ const o={...base}; for(const k in over){ if(over[k]&&typeof over[k]==='object'&&!Array.isArray(over[k])&&base[k]&&typeof base[k]==='object'&&!Array.isArray(base[k])) o[k]=deepMerge(base[k],over[k]); else o[k]=over[k]; } return o; }
let S;
try{ S = deepMerge(DEFAULTS, JSON.parse(localStorage.getItem(SKEY)||'{}')); }catch(e){ S = JSON.parse(JSON.stringify(DEFAULTS)); }
function save(){ try{localStorage.setItem(SKEY,JSON.stringify(S))}catch(e){} }
function track(e,d){ S.analytics.events.push({t:Date.now(),e,...(d||{})}); if(S.analytics.events.length>400) S.analytics.events.splice(0,S.analytics.events.length-400); }

/* ============ LEVELS / UNLOCKS ============ */
function xpNeed(l){ return 100+(l-1)*60 }
function levelFromXP(xp){ let l=1; while(xp>=xpNeed(l)){ xp-=xpNeed(l); l++ } return {level:l, into:xp, need:xpNeed(l)} }
function titleFor(l){ return l>=50?'Chrono Legend':l>=40?'Grandmaster':l>=25?'Time Master':l>=15?'Sharpshooter':l>=10?'Tempo Adept':l>=5?'Bronze Timer':'Rookie' }
const FXNAMES = {confetti:{n:'Confetti',i:'🎉'},fireworks:{n:'Fireworks',i:'🎆'},emoji:{n:'Emoji Rain',i:'🤩'},starfall:{n:'Starfall',i:'🌠'}};
const THEMES = {aurora:{n:'Aurora',c:['#8b5cf6','#3b82f6']},sunset:{n:'Sunset',c:['#fb7185','#fbbf24']},emerald:{n:'Emerald',c:['#10b981','#0ea5e9']},crimson:{n:'Crimson',c:['#ef4444','#fb7185']},mono:{n:'Mono',c:['#f9fafb','#4b5563']},royal:{n:'Royal',c:['#fbbf24','#6d28d9']},obsidian:{n:'Obsidian',c:['#262626','#fbbf24']},prism:{n:'Prism',c:['#f472b6','#a3e635']}};
const UNLOCKS = [
  {lvl:1,type:'theme',id:'aurora'},{lvl:1,type:'avatar',id:'⏱️'},{lvl:1,type:'avatar',id:'😀'},{lvl:1,type:'sound',id:'classic'},{lvl:1,type:'button',id:'glass'},{lvl:1,type:'border',id:'none'},{lvl:1,type:'fx',id:'confetti'},
  {lvl:14,type:'fx',id:'fireworks'},{lvl:22,type:'fx',id:'emoji'},
  {lvl:2,type:'theme',id:'sunset'},
  {lvl:3,type:'avatar',id:'🦊'},
  {lvl:4,type:'sound',id:'arcade'},
  {lvl:5,type:'badge',id:'Bronze Timer'},{lvl:5,type:'border',id:'bronze'},
  {lvl:6,type:'avatar',id:'🐸'},
  {lvl:7,type:'theme',id:'emerald'},
  {lvl:8,type:'button',id:'neon'},

const RANKS = Object.freeze([
  Object.freeze({max:.05,name:'Diamond',emoji:'💎'}),
  Object.freeze({max:.10,name:'Platinum',emoji:'🥈'}),
  Object.freeze({max:.25,name:'Gold',emoji:'🥇'}),

]);
function rankFor(diff){ return RANKS.find(r=>diff<=r.max) }
function scoreFor(diff){ return diff<=0.05 ? 1000 : Math.max(0, Math.round(950*(1-(diff-0.05)/1.95))) }
// anti-cheat: sanity-validate before anything touches stats or the board
function validateResult(target,actual,diff,score){
  return Number.isFinite(target)&&Number.isFinite(actual)&&actual>=0&&actual<600&&
         Math.abs(Math.abs(actual-target)-diff)<0.002 && score>=0&&score<=1000&&score===scoreFor(diff);
}
function randTarget(cfg){ return cfg.min+Math.floor(Math.random()*(cfg.max-cfg.min+1)) }
function dailyTarget(date){ const r=mulberry32(hashStr('TG-daily-'+date)); return 5+Math.floor(r()*11) }
function worldTarget(key){ const r=mulberry32(hashStr('TG-world-'+key)); return 4+Math.floor(r()*24) }

const fxc=$('fx'), fctx=fxc.getContext('2d'); let parts=[], fxRun=false;
function sizeFx(){ fxc.width=phone.clientWidth*devicePixelRatio; fxc.height=phone.clientHeight*devicePixelRatio; fctx.scale(devicePixelRatio,devicePixelRatio); }
window.addEventListener('resize',sizeFx);
function themeCols(){const cs=getComputedStyle(phone);return [cs.getPropertyValue('--accent'),cs.getPropertyValue('--accent2'),cs.getPropertyValue('--accent3'),'#fbbf24','#fff'].map(c=>c.trim())}
function spawnRun(){ if(!fxRun){fxRun=true;requestAnimationFrame(fxTick)} }
function confetti(n=110){
  if(S.settings.motion==='reduce') return;
  sizeFx(); const cols=themeCols(), W=phone.clientWidth;
  for(let i=0;i<n;i++) parts.push({kind:'rect',x:W/2+(Math.random()-.5)*120,y:phone.clientHeight*.42,vx:(Math.random()-.5)*11,vy:-(4+Math.random()*9),g:.28+Math.random()*.12,r:3+Math.random()*5,c:cols[i%cols.length],rot:Math.random()*6,vr:(Math.random()-.5)*.3,life:90+Math.random()*50});
  spawnRun();
}
function fireworks(bursts=4){
  if(S.settings.motion==='reduce') return;
  sizeFx(); const cols=themeCols(), W=phone.clientWidth, H=phone.clientHeight;
  for(let b=0;b<bursts;b++){
    const bx=W*(0.18+Math.random()*0.64), by=H*(0.15+Math.random()*0.32), delay=b*9, col=cols[b%cols.length];
    for(let i=0;i<34;i++){
      const ang=i/34*Math.PI*2+Math.random()*.2, sp=2+Math.random()*3.6;
      parts.push({kind:'dot',x:bx,y:by,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,g:.05,r:2.2+Math.random()*2.6,c:i%4===3?'#fff':col,rot:0,vr:0,life:52+Math.random()*28+delay,wait:delay});
    }
  }
  spawnRun();
}
function emojiRain(n=36){
  if(S.settings.motion==='reduce') return;
  sizeFx(); const W=phone.clientWidth, EM=['🎉','💎','⚡','🏆','✨','🎯'];
  for(let i=0;i<n;i++) parts.push({kind:'txt',txt:EM[i%EM.length],x:Math.random()*W,y:-30-Math.random()*160,vx:(Math.random()-.5)*1.6,vy:2.2+Math.random()*3,g:.045,r:6+Math.random()*5,c:'#fff',rot:(Math.random()-.5),vr:(Math.random()-.5)*.08,life:130+Math.random()*40});
  spawnRun();
}
function starfall(n=70){
  if(S.settings.motion==='reduce') return;
  sizeFx(); const cols=themeCols(), W=phone.clientWidth;
  for(let i=0;i<n;i++) parts.push({kind:'star',x:Math.random()*(W+160)-40,y:-10-Math.random()*200,vx:-1.2-Math.random()*1.6,vy:3.2+Math.random()*4,g:.018,r:1.4+Math.random()*2.4,c:i%3?cols[2]:'#fff',rot:0,vr:0,life:95+Math.random()*45});
  spawnRun();
}
function celebrate(n=120){
  const fx=S.equipped.fx||'confetti';
  if(fx==='fireworks') fireworks(2+Math.round(n/55));
  else if(fx==='emoji') emojiRain(clamp(Math.round(n/3),20,52));
  else if(fx==='starfall') starfall(Math.round(n*.7));
  else confetti(n);
}
function fxTick(){
  fctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  fctx.clearRect(0,0,fxc.width,fxc.height);
  parts=parts.filter(p=>p.life>0);
  for(const p of parts){
    p.life--;
    if(p.wait&&p.wait>0){p.wait--;continue}
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.vx*=.99; p.rot+=p.vr;
    fctx.save(); fctx.translate(p.x,p.y); fctx.globalAlpha=clamp(p.life/40,0,1);
    if(p.kind==='dot'){ fctx.fillStyle=p.c; fctx.beginPath(); fctx.arc(0,0,p.r,0,7); fctx.fill(); }
    else if(p.kind==='txt'){ fctx.rotate(p.rot); fctx.font=p.r*3.2+'px serif'; fctx.textAlign='center'; fctx.fillText(p.txt,0,0); }
    else if(p.kind==='star'){ fctx.strokeStyle=p.c; fctx.lineWidth=p.r; fctx.lineCap='round'; fctx.beginPath(); fctx.moveTo(0,0); fctx.lineTo(-p.vx*4,-p.vy*4); fctx.stroke(); }
    else { fctx.rotate(p.rot); fctx.fillStyle=p.c; fctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.6); }
    fctx.restore();
  }
  if(parts.length){requestAnimationFrame(fxTick)}else{fxRun=false;fctx.clearRect(0,0,fxc.width,fxc.height)}
}

/* ============ STREAK / DAILY BOOKKEEPING ============ */
function bumpStreak(){
  const t=todayStr();
  if(S.streak.last===t) return;
  const y=todayStr(new Date(Date.now()-864e5));
  if(S.streak.last===y) S.streak.cur++;
  else if(S.streak.last===null) S.streak.cur=1;
  else {
    // premium streak freeze: forgive a single missed day
    const y2=todayStr(new Date(Date.now()-2*864e5));
    if(S.premium && S.streak.last===y2){ S.streak.cur++; toast('Streak Freeze used — streak saved!','🧊'); }
    else S.streak.cur=1;
  }
  S.streak.last=t;
  S.streak.longest=Math.max(S.streak.longest,S.streak.cur);
}

  const pool=[...QUEST_POOL], pick=[];
  while(pick.length<3 && pool.length){ pick.push(pool.splice(Math.floor(r()*pool.length),1)[0]) }

/* ============ RECORD GAME ============ */
function recordGame(mode,target,actual,diff,score,opts={}){
  if(!validateResult(target,actual,diff,score)){ toast('Result rejected by anti-cheat','🛡️'); return {xp:0,acc:0,pb:false}; }
  const t=todayStr();
  S.gamesPlayed++; S.totalScore+=score;
  const acc=clamp((1-diff/Math.max(target,0.001))*100,0,100);
  S.sumAcc+=acc;
  const pbDiff = S.bestDiff===null||diff<S.bestDiff;
  if(pbDiff) S.bestDiff=diff;
  const pbScore = score>S.bestScore;
  if(pbScore) S.bestScore=score;
  if(score===1000) S.perfects++;
  S.gamesByDate[t]=(S.gamesByDate[t]||0)+1;
  S.modePlays[mode]=(S.modePlays[mode]||0)+1;
  S.recentErrs.push(+(actual-target).toFixed(3)); if(S.recentErrs.length>40)S.recentErrs.shift();
  bumpStreak();
  // XP
  const r=rankFor(diff);
  S.diamondRow = r.name==='Diamond' ? (S.diamondRow||0)+1 : 0;
  const hh=new Date().getHours();
  if((hh>=23||hh<5)&&!S.achievements.nightowl) unlockAchManual('nightowl');
  let xp=Math.round(score/10);
  xp += r.name==='Diamond'?50:r.name==='Platinum'?30:r.name==='Gold'?20:r.name==='Silver'?10:0;
  if(S.gamesByDate[t]===1){ xp+=25 }
  if(S.streak.cur>=3) xp+=10;
  if(opts.xpBonus) xp+=opts.xpBonus;
  track('game',{mode,score,diff:+diff.toFixed(3)});
  grantXP(xp,'game');
  questTick({mode,diff,score});
  checkAch();
  save();
  return {xp,acc,pb:pbDiff&&S.gamesPlayed>3};
}

/* ============ GAME SESSION ============ */
let session=null;
let _t0=0; // closure-scoped timer origin — never rendered, never on window
function startGame(modeId,opts={}){
  const cfg=MODES[modeId];
  session={
    mode:modeId, cfg, kind:opts.kind||'solo',
    target: opts.target!=null?opts.target:randTarget(cfg),
    rounds: cfg.rounds||1, round:1,
    totalScore:0, combo:0, maxCombo:0, results:[],
    players:opts.players||null, pIdx:0,
    alive:opts.players?opts.players.map((p,i)=>i):null,
    mpRound:1, mpResults:[],
    running:false, locked:false, blindTimer:null,
  };
  go('game');
  renderGameUI();
  track('start_mode',{mode:modeId});
}
function renderGameUI(){
  const s=session;
  $('g-modename').textContent = s.cfg.name;
  $('g-round').textContent = s.rounds>1 ? `${s.round}/${s.rounds}` : (s.kind==='standoff'?`R${s.mpRound}`:'');
  $('g-target').innerHTML = `${s.target}<span class="tunit">sec</span>`;
  $('g-targetwrap').classList.remove('veiled');
  const big=$('g-big'); big.textContent='START'; big.classList.remove('stop');
  $('g-combo').classList.add('hidden');
  $('g-player').classList.toggle('hidden',!s.players);
  if(s.players){ $('g-player').textContent='🎮 '+s.players[s.pIdx].name+"'s turn"; }
  $('g-hint').innerHTML = s.kind==='practice'
    ? `Practice 🎯 Press START, wait about <b>${s.target} seconds</b>, then STOP. This one won't count!`
    : s.cfg.blind
    ? 'Memorize the target — it disappears 2 seconds after you start!'
    : 'Press START, count in your head, press STOP right on time.';
  s.running=false; s.locked=false;
  if(s.blindTimer){clearTimeout(s.blindTimer); s.blindTimer=null;}
}
$('g-big').addEventListener('click',()=>{
  const s=session; if(!s||s.locked) return;
  if(!s.running){
    s.running=true; _t0=performance.now();
    sfx.start(); buzz(15);
    const big=$('g-big'); big.textContent='STOP'; big.classList.add('stop');
    $('g-hint').innerHTML='Timer running — trust your instincts<span class="runningdots"><i></i><i></i><i></i></span>';
    if(s.cfg.blind){ s.blindTimer=setTimeout(()=>{ $('g-targetwrap').classList.add('veiled'); },2000); }
  } else {
    const actual=(performance.now()-_t0)/1000;
    s.running=false; s.locked=true;
    sfx.stop(); buzz(25);
    if(s.blindTimer){clearTimeout(s.blindTimer); s.blindTimer=null;}
    handleStop(actual);
  }
});
function quitGame(){ session=null; closeSheet(); go('home'); }

function handleStop(actual){
  const s=session;
  const diff=+Math.abs(actual-s.target).toFixed(3);
  const score=scoreFor(diff);
  const rank=rankFor(diff);
  if(s.kind==='practice'){ finishPractice(actual,diff,score,rank); }
  else if(s.kind==='solo'||s.kind==='daily'||s.kind==='world'){ finishSolo(actual,diff,score,rank); }
  else if(s.kind==='rush'){ rushRound(actual,diff,score,rank); }
  else { mpTurnDone(actual,diff,score,rank); }
}

/* ---- solo / daily / world ---- */
function finishSolo(actual,diff,score,rank){
  const s=session;
  S.playsSinceAd++;
  const rec=recordGame(s.mode,s.target,actual,diff,score);
  let extra='';
  if(s.kind==='daily'){
    S.daily={date:todayStr(),done:true,diff,score,pos:0};
    const lb=dailyBoard(diff);
    S.daily.pos=lb.pos;
    if(lb.pos===1){S.dailyWins++; }
    if(lb.pos<=10){S.dailyTop10++;}
    extra=`<div class="resrow" style="animation-delay:.45s"><span class="rl">Daily Rank</span><span class="rv">#${lb.pos} of ${lb.total}</span></div>`;
    checkAch(); save();
  }
  if(s.kind==='world'){
    const pct=clamp(Math.round(100*(1-diff/(diff+0.30))),1,99);
    S.world={key:hourKey(),done:true,pct,diff};
    if(pct>=90) unlockAchManual('world90');
    extra=`<div class="resrow" style="animation-delay:.45s"><span class="rl">Worldwide</span><span class="rv" style="color:var(--accent3)">Better than ${pct}% 🌍</span></div>`;
    save();
  }
  showResults({target:s.target,actual,diff,score,rank,xp:rec.xp,pb:rec.pb,extra,mode:s.mode,kind:s.kind});
}

/* ---- rush ---- */
function rushRound(actual,diff,score,rank){
  const s=session;
  const goodCombo=diff<=0.25;
  s.combo = goodCombo ? s.combo+1 : 0;
  s.maxCombo=Math.max(s.maxCombo,s.combo);
  const mult = 1 + Math.min(s.combo*0.1, 0.5);
  const finalScore=Math.round(score*mult);
  s.totalScore+=finalScore;
  s.results.push({diff,score:finalScore,rank});
  recordGame('rush',s.target,actual,diff,score,{}); // base score recorded per-round
  const fl=document.createElement('div'); fl.className='roundflash';
  fl.innerHTML=`<div class="rfrank">${rank.emoji}</div><div class="rfscore">+${finalScore}</div>
    <div class="rfsub">${rank.name}${s.combo>1?` · COMBO ×${(1+Math.min(s.combo*0.1,.5)).toFixed(1)} 🔥`:''} · off by ${fmtS(diff)}s</div>`;
  $('scr-game').appendChild(fl);
  sfx.rank(rank.name);
  setTimeout(()=>{
    fl.remove();
    if(s.round>=s.rounds){ rushDone(); }
    else{ s.round++; s.target=randTarget(s.cfg); renderGameUI();
      if(s.combo>1){ $('g-combo').classList.remove('hidden'); $('g-combo').textContent=`🔥 COMBO ×${(1+Math.min(s.combo*0.1,.5)).toFixed(1)}`; } }
  },1300);
}
function rushDone(){
  const s=session;
  S.playsSinceAd++;
  const pb=s.totalScore>S.rushBest;
  if(pb) S.rushBest=s.totalScore;
  questTick({mode:'rush_final',diff:9,score:0});
  checkAch(); save();
  const dots=s.results.map(r=>`<div class="rdot">${r.rank.emoji}</div>`).join('');
  const avg=s.results.reduce((a,r)=>a+r.diff,0)/s.results.length;
  openSheet(`
    <div class="grab"></div>
    <div class="rankbig"><span class="remoji">⚡</span><div class="rankname">Rush Complete!</div></div>
    ${pb?'<div class="pbflag">🏅 NEW RUSH RECORD</div>':''}
    <div class="scorebig"><div class="scorenum" id="cnt-score">0</div><div class="scorelbl">TOTAL SCORE</div></div>
    <div class="roundlist">${dots}</div>
    <div class="resrows">
      <div class="resrow"><span class="rl">Best Combo</span><span class="rv">×${(1+Math.min(s.maxCombo*0.1,.5)).toFixed(1)}</span></div>
      <div class="resrow"><span class="rl">Avg Difference</span><span class="rv">${fmtS(avg)}s</span></div>
      <div class="resrow"><span class="rl">Personal Best</span><span class="rv">${S.rushBest}</span></div>
    </div>
    <div class="sheetbtns">
      <div class="btnrow">
        <button class="btn btn-ghost" onclick="closeSheet();maybeAd(()=>go('home'))">Home</button>
        <button class="btn btn-grad" onclick="closeSheet();maybeAd(()=>startGame('rush',{kind:'rush'}))">Run It Back ⚡</button>
      </div>
    </div>`);
  countUp($('cnt-score'),s.totalScore,900);
  if(pb){celebrate(160);sfx.win()}else sfx.ok();
}

let mpKind='battle';
function openMpSetup(kind){

function mpAddPlayer(val){

  const row=document.createElement('div'); row.className='namerow';
  row.innerHTML=`<input maxlength="14" placeholder="Player name" value="${typeof val==='string'?val:'Player '+(box.children.length+1)}">
    <button class="iconbtn" onclick="if(document.getElementById('mp-names').children.length>2)this.parentElement.remove()">✕</button>`;

function mpStart(){
  const names=[...$('mp-names').querySelectorAll('input')].map(i=>i.value.trim()).filter(Boolean);
  if(names.length<2){toast('Need at least 2 players','👥');return}
  const players=names.map(n=>({name:n,actual:null,diff:null,score:null}));
  const target=randTarget(MODES.classic);
  startGame(mpKind==='battle'?'battle':'standoff',{kind:mpKind,players,target});

function mpPassPhone(){
  const s=session;
  const p=s.players[s.pIdx];
  openModal2(`
    <div style="text-align:center;padding:10px 0">
      <div style="font-size:50px">📲</div>

      <p class="sub" style="margin:6px 0 18px">Target: <b style="color:var(--text)">${s.target} sec</b>${s.kind==='standoff'?` · Round ${s.mpRound}`:''}</p>
      <button class="btn btn-grad" onclick="closeModal2();renderGameUI()">I'm ${esc(p.name)} — Ready!</button>
    </div>`);
}
function mpTurnDone(actual,diff,score,rank){
  const s=session;
  const p=s.players[s.pIdx];
  p.actual=actual; p.diff=diff; p.score=score; p.rank=rank;
  // find next alive player after pIdx
  const order = s.kind==='standoff' ? s.alive : s.players.map((_,i)=>i);
  const cur = order.indexOf(s.pIdx);
  if(cur < order.length-1){
    s.pIdx=order[cur+1];
    openModal2(`
      <div style="text-align:center;padding:10px 0">
        <div style="font-size:46px">🔒</div>
        <div class="mtitle" style="margin-top:10px">${esc(p.name)} locked in!</div>
        <p class="sub" style="margin:6px 0 18px">No peeking — results revealed at the end.</p>
        <button class="btn btn-grad" onclick="closeModal2();mpPassPhone()">Next: ${esc(s.players[s.pIdx].name)} →</button>
      </div>`);
  } else {
    s.kind==='battle' ? mpRevealBattle() : mpRevealStandoff();
  }
}
function mpRevealBattle(){
  const s=session;
  const sorted=[...s.players].sort((a,b)=>a.diff-b.diff);
  grantXP(30,'mp'); S.modePlays.battle=(S.modePlays.battle||0)+1; track('game',{mode:'battle'}); save();
  showWinner(sorted, `Target was ${s.target}s — won by ${fmtS(sorted[0].diff)}s off`);
}
function mpRevealStandoff(){
  const s=session;
  const alivePlayers=s.alive.map(i=>s.players[i]);
  const sorted=[...s.alive].sort((a,b)=>s.players[a].diff-s.players[b].diff);
  const outIdx=sorted[sorted.length-1];
  const out=s.players[outIdx];
  s.alive=s.alive.filter(i=>i!==outIdx);
  const rows=alivePlayers.sort((a,b)=>a.diff-b.diff).map(p=>`<div class="lbrow${p===out?' me':''}"><div class="nm">${p===out?'💀 ':''}${esc(p.name)}</div><div class="df">${fmtS(p.diff)}s off</div></div>`).join('');
  if(s.alive.length===1){
    const champ=s.players[s.alive[0]];
    grantXP(40,'mp'); S.modePlays.standoff=(S.modePlays.standoff||0)+1; save();
    openModal2(`
      <div class="mtitle" style="text-align:center">Round ${s.mpRound} Results</div>
      <p class="sub" style="text-align:center;margin:4px 0 14px">Target: ${s.target}s · ${esc(out.name)} is eliminated!</p>${rows}
      <button class="btn btn-grad" style="margin-top:12px" onclick="closeModal2();showWinner([{name:'${esc(champ.name)}',diff:${champ.diff},score:${champ.score}}],'Last one standing! 👑')">Crown the Winner 👑</button>`);
  } else {
    openModal2(`
      <div class="mtitle" style="text-align:center">Round ${s.mpRound} Results</div>
      <p class="sub" style="text-align:center;margin:4px 0 14px">Target: ${s.target}s · ${esc(out.name)} is eliminated!</p>${rows}
      <button class="btn btn-grad" style="margin-top:12px" onclick="closeModal2();mpNextRound()">Next Round →</button>`);
  }
  sfx.ok(); buzz([20,40,20]);
}
function mpNextRound(){
  const s=session;
  s.mpRound++; s.target=randTarget(MODES.classic);
  s.players.forEach(p=>{p.diff=null;p.actual=null});
  s.pIdx=s.alive[0];
  mpPassPhone(); renderGameUI();
}
let lastMp=null;
function showWinner(sorted,sub){
  S.playsSinceAd++; save();
  lastMp={kind:session?session.kind:mpKind, names:session?session.players.map(p=>p.name):null};
  session=null;
  $('win-name').textContent=sorted[0].name;
  $('win-sub').textContent=sub;
  const pod=$('win-podium'); pod.innerHTML='';
  const order=[1,0,2], cls=['second','first','third'];
  order.forEach((idx,k)=>{
    if(!sorted[idx])return;
    const p=sorted[idx];
    pod.innerHTML+=`<div class="pcol ${cls[k]}"><div class="pname">${esc(p.name)}</div><div class="pdiff">${fmtS(p.diff)}s off</div><div class="pbar">${idx+1}</div></div>`;
  });
  $('win-rest').innerHTML=sorted.slice(3).map((p,i)=>`<div class="lbrow"><div class="pos">${i+4}</div><div class="nm">${esc(p.name)}</div><div class="df">${fmtS(p.diff)}s off</div></div>`).join('');
  go('winner'); celebrate(180); sfx.win(); buzz([30,60,30,60]);
}
function mpRematch(){
  if(lastMp&&lastMp.names){
    const players=lastMp.names.map(n=>({name:n,actual:null,diff:null,score:null}));
    startGame(lastMp.kind==='standoff'?'standoff':'battle',{kind:lastMp.kind,players,target:randTarget(MODES.classic)});
    mpPassPhone();
  } else openMpSetup(mpKind);
}

function openSheet(html){ $('sheet').innerHTML=html; $('sheet').style.transform=''; $('sheetwrap').classList.add('open'); }
function closeSheet(){ $('sheetwrap').classList.remove('open'); }
function dismissSheet(){ closeSheet(); if(curScreen==='game') maybeAd(()=>go('home')); }
// swipe-down to dismiss + tap backdrop
(function(){
  const sh=$('sheet'), wrap=$('sheetwrap'); let sy=null, dy=0;
  sh.addEventListener('touchstart',e=>{ if(sh.scrollTop>2)return; sy=e.touches[0].clientY; dy=0; sh.style.transition='none'; },{passive:true});
  sh.addEventListener('touchmove',e=>{ if(sy===null)return; dy=Math.max(0,e.touches[0].clientY-sy); sh.style.transform=`translateY(${dy}px)`; },{passive:true});
  sh.addEventListener('touchend',()=>{ if(sy===null)return;
    sh.style.transition='transform .3s var(--spring)'; sh.style.transform='';
    if(dy>110){ buzz(10); dismissSheet(); }
    sy=null; dy=0; });
  wrap.addEventListener('click',e=>{ if(e.target===wrap) dismissSheet(); });
})();
function countUp(el,to,ms){
  if(!el)return;
  if(S.settings.motion==='reduce'){el.textContent=to;return}
  const t0=performance.now();
  (function step(t){ const k=clamp((t-t0)/ms,0,1), e=1-Math.pow(1-k,3); el.textContent=Math.round(to*e); if(k<1)requestAnimationFrame(step); })(t0);
}
function nearMissText(diff,rank){
  for(let i=0;i<RANKS.length-1;i++){
    if(diff>RANKS[i].max && diff<=RANKS[i].max+0.06) return `So close — just ${fmtS(diff-RANKS[i].max)}s from ${RANKS[i].name} ${RANKS[i].emoji}`;
  }
  if(rank.name==='Diamond'&&diff>0.02) return 'Inhuman precision. 💎';
  return '';
}
function coachText(){
  if(S.recentErrs.length<8) return '';
  const last=S.recentErrs.slice(-10);
  const mean=last.reduce((a,b)=>a+b,0)/last.length;
  if(mean>0.12) return `🧠 Coach: you tend to stop ~${fmtS(mean)}s <b>late</b>. Trust your gut a beat sooner.`;
  if(mean<-0.12) return `🧠 Coach: you tend to stop ~${fmtS(-mean)}s <b>early</b>. Hold your nerve a beat longer.`;
  return '';
}

function genShare(fmt){
  closeModal2();
  const r=lastResult; if(!r) return;
  const L=SHARE_LAY[fmt]||SHARE_LAY.story, W=L.W, H=L.H, cx=W/2;
  const c=document.createElement('canvas'); c.width=W; c.height=H;
  const x=c.getContext('2d');
  const cs=getComputedStyle(phone);
  const a1=cs.getPropertyValue('--accent').trim(), a2=cs.getPropertyValue('--accent3').trim();
  const g=x.createLinearGradient(0,0,W,H); g.addColorStop(0,'#0b0b1c'); g.addColorStop(1,'#171138');
  x.fillStyle=g; x.fillRect(0,0,W,H);
  for(let i=0;i<Math.round(W*H/45000);i++){ x.fillStyle='rgba(255,255,255,'+(Math.random()*.25)+')'; x.beginPath(); x.arc(Math.random()*W,Math.random()*H,Math.random()*3+1,0,7); x.fill(); }
  const gg=x.createLinearGradient(0,H*.26,W,H*.73); gg.addColorStop(0,a1); gg.addColorStop(1,a2);
  x.fillStyle='rgba(255,255,255,.07)'; x.strokeStyle='rgba(255,255,255,.18)'; x.lineWidth=3;
  const cd=L.card;
  if(x.roundRect){x.beginPath(); x.roundRect(cd[0],cd[1],cd[2],cd[3],cd[4]); x.fill(); x.stroke();}else{x.fillRect(cd[0],cd[1],cd[2],cd[3])}
  x.textAlign='center';
  const T=(spec,str,fill,weight='900',font='Inter,sans-serif')=>{ if(!spec[0])return; x.fillStyle=fill; x.font=`${weight} ${spec[0]}px ${font}`; x.fillText(str,cx,spec[1]); };
  T(L.title,'TempoGuess',gg);
  T(L.sub,'How good is your inner clock?','rgba(255,255,255,.6)','600');
  x.font=L.emoji[0]+'px serif'; x.fillText(r.rank.emoji,cx,L.emoji[1]);
  T(L.rank,r.rank.name.toUpperCase(),'#fff');
  T(L.score,String(r.score),gg);
  T(L.lbl,'SCORE / 1000','rgba(255,255,255,.55)','700');
  T(L.times,`Target ${r.target}.00s   ·   Mine ${r.actual.toFixed(2)}s`,'rgba(255,255,255,.85)','600');
  T(L.diff,`Only ${fmtS(r.diff)}s off!`,r.diff<=0.25?'#34d399':'#fbbf24','800');
  T(L.user,`${esc(S.name)} · Level ${curLevel()} ${titleFor(curLevel())}`,'rgba(255,255,255,.5)','600');
  T(L.cta,'Can you beat me? 🎯','#fff','800');
  S.shares++; checkAch(); save(); track('share',{fmt});
  const text=`TempoGuess 🎯\nTarget: ${r.target} sec\nMy Time: ${r.actual.toFixed(2)} sec\nDifference: ${fmtS(r.diff)} sec\nScore: ${r.score} ${r.rank.emoji} ${r.rank.name}\nCan you beat me?`;
  c.toBlob(async blob=>{
    try{
      const file=new File([blob],'tempoguess.png',{type:'image/png'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){ await navigator.share({files:[file],text}); toast('Shared!','📣'); return; }
    }catch(e){}
    try{ if(navigator.share){ await navigator.share({text}); toast('Shared!','📣'); return; } }catch(e){}
    const C=CAP();
    if(C){ try{ await C.Plugins.Share.share({title:'TempoGuess',text}); toast('Shared!','📣'); return; }catch(e){} }
    const a=document.createElement('a'); a.href=c.toDataURL('image/png'); a.download='tempoguess-result.png'; a.click();
    try{ await navigator.clipboard.writeText(text); }catch(e){}
    toast('Card saved + text copied 📋','📤',3000);
  },'image/png');
}

/* ============ DAILY BOARD (seeded bots) ============ */
const BOTNAMES=['NovaTik','PulseKid','Zen0','MsTempo','ClockWiz','Heartbeat','TikTakPro','Lagless','OneMissOnly','Drift','Kairos','BeatBox','Metronome','SnapJudge','Phantom','EchoTime','Vsync','BlinkTwice','SteadyEddy','Quartz','TempoQueen','SirStops','NanoSec','Chrononaut'];
function dailyBoard(myDiff){
  const t=todayStr();
  const bots=BOTNAMES.map((n,i)=>{
    const r=mulberry32(hashStr(t+'-bot-'+i));
    return {name:n,diff:+(Math.pow(r(),1.7)*1.35+0.018+r()*0.05).toFixed(3),bot:true};
  });
  const all=[...bots];
  if(myDiff!=null) all.push({name:S.name,diff:myDiff,me:true});
  all.sort((a,b)=>a.diff-b.diff);
  return {list:all,pos:myDiff!=null?all.findIndex(e=>e.me)+1:0,total:all.length};
}

function equip(type,id,unlocked){
  if(!unlocked){ const u=UNLOCKS.find(x=>x.type===type&&x.id===id);
    if(u&&u.pro){ openPremium(); } else { toast(`Unlocks at level ${u?u.lvl:'?'}`,'🔒'); buzz(30); }
    return; }
  if(type==='badge'&&S.equipped.badge===id){ S.equipped.badge=null; }
  else S.equipped[type]=id;
  save(); applyLook(); renderLocker(); sfx.tap(); buzz(10);
  if(type==='sound') sfx.ok();
  if(type==='fx') celebrate(90);
}

    <div class="mtitle">Settings</div>
    <div class="setrow"><div><div class="sn">Appearance</div></div>
      <div class="seg">${['auto','dark','light'].map(m=>`<button class="${S.settings.appearance===m?'on':''}" onclick="setSet('appearance','${m}')">${m[0].toUpperCase()+m.slice(1)}</button>`).join('')}</div></div>
    <div class="setrow"><div><div class="sn">Haptic Feedback</div><div class="sd">Vibration on supported devices</div></div><button class="toggle ${S.settings.haptics?'on':''}" onclick="setSet('haptics',!S.settings.haptics)"></button></div>
    <div class="setrow"><div><div class="sn">Sound Effects</div><div class="sd">Pack: ${SOUNDPACKS[S.equipped.sound].name}</div></div><button class="toggle ${S.settings.sound?'on':''}" onclick="setSet('sound',!S.settings.sound)"></button></div>
    <div class="setrow"><div><div class="sn">Reduce Motion</div><div class="sd">Calmer animations</div></div><button class="toggle ${S.settings.motion==='reduce'?'on':''}" onclick="setSet('motion',S.settings.motion==='reduce'?'full':'reduce')"></button></div>
    <div class="setrow"><div><div class="sn">TempoGuess Pro</div><div class="sd">${S.premium?'Active — thank you! 💜':'Remove ads + exclusives'}</div></div>${S.premium?'<span class="prembadge">ACTIVE</span>':'<button class="btn btn-grad btn-sm" onclick="closeModal();openPremium()">Upgrade</button>'}</div>
    <div class="setrow"><div><div class="sn">Replay Tutorial</div></div><button class="btn btn-ghost btn-sm" onclick="closeModal();startOnboarding()">Play</button></div>
    <div class="setrow"><div><div class="sn">Export Save</div><div class="sd">Back up progress or move devices</div></div><button class="btn btn-ghost btn-sm" onclick="exportSave()">Export</button></div>
    <div class="setrow"><div><div class="sn">Import Save</div><div class="sd">Restore from a save code</div></div><button class="btn btn-ghost btn-sm" onclick="importSaveUI()">Import</button></div>
    <div class="setrow"><div><div class="sn">Reset All Progress</div><div class="sd">Cannot be undone</div></div><button class="btn btn-ghost btn-sm" style="color:var(--bad)" onclick="resetAll()">Reset</button></div>
    <p class="sub" style="text-align:center;margin-top:16px">TempoGuess v1.0 · made with 💜<br>Anti-cheat active · timers are sealed 🛡️</p>
    <button class="btn btn-grad" style="margin-top:12px" onclick="closeModal()">Done</button>`);
}
function setSet(k,v){ S.settings[k]=v; save(); applyLook(); openSettings(); sfx.tap(); }
/* save backup codes: TG1.<base64 json>.<checksum> — checksum blocks casual tampering */
function saveCode(){ const json=JSON.stringify(S); return 'TG1.'+btoa(unescape(encodeURIComponent(json)))+'.'+hashStr(json).toString(36); }
function exportSave(){
  openModal2(`
    <div class="mtitle">Export Save</div>
    <p class="sub">Copy this code, then use Import Save on any device or browser to restore everything.</p>
    <textarea class="savebox" id="exp-code" readonly>${saveCode()}</textarea>
    <button class="btn btn-grad" onclick="copyExport()">📋 Copy Code</button>
    <button class="btn" style="color:var(--muted);font-size:13px;margin-top:6px" onclick="closeModal2()">Close</button>`);
}
async function copyExport(){
  const ta=$('exp-code'); ta.select(); ta.setSelectionRange(0,999999);
  try{ await navigator.clipboard.writeText(ta.value); toast('Save code copied!','📋'); }
  catch(e){ try{document.execCommand('copy'); toast('Save code copied!','📋');}catch(e2){ toast('Select & copy manually','📋'); } }
}
function importSaveUI(){
  openModal2(`
    <div class="mtitle">Import Save</div>
    <p class="sub">Paste a save code below. This replaces all progress on this device.</p>
    <textarea class="savebox" id="imp-code" placeholder="TG1.…"></textarea>
    <button class="btn btn-grad" onclick="doImport()">Restore Save</button>
    <button class="btn" style="color:var(--muted);font-size:13px;margin-top:6px" onclick="closeModal2()">Cancel</button>`);
}
function doImport(){
  try{
    const m=$('imp-code').value.trim().match(/^TG1\.([A-Za-z0-9+/=]+)\.([a-z0-9]+)$/);
    if(!m) throw 0;
    const json=decodeURIComponent(escape(atob(m[1])));
    if(hashStr(json).toString(36)!==m[2]) throw 0;
    const obj=JSON.parse(json);
    if(typeof obj.totalXP!=='number') throw 0;
    localStorage.setItem(SKEY,JSON.stringify(deepMerge(DEFAULTS,obj)));
    toast('Save restored! Reloading…','✅');
    setTimeout(()=>location.reload(),800);
  }catch(e){ toast('Invalid save code','⚠️'); buzz(40); }
}
function resetAll(){
  if(confirm('Really erase ALL progress? This cannot be undone.')){
    localStorage.removeItem(SKEY); location.reload();
  }
}

/* ============ ONBOARDING ============ */
const OB=[
  {i:'🎯',t:'See the Target',d:'Every round gives you a target time — like 15 seconds. Lock it into your brain.'},
  {i:'▶️',t:'Press Start',d:'The timer starts… invisibly. No countdown. No ticking. Just you and your inner clock.'},
  {i:'🧠',t:'Feel the Time',d:'Count heartbeats, breathe, vibe — whatever works. Time moves weirder than you think.'},
  {i:'✋',t:'Press Stop',d:'When you believe the exact target time has passed — STOP. Nerves of steel required.'},
  {i:'💎',t:'Get Ranked',d:'Within 0.05s = Diamond and a perfect 1000. Earn XP, unlock themes, climb the world ranks!'},
];
let obIdx=0, obPhase='cards'; // 'cards' | 'name' | 'try'
function startOnboarding(){ obIdx=0; obPhase='cards'; $('onboard').classList.add('active'); $('ob-skip').style.display=''; $('ob-skip').textContent='Skip'; $('tabbar').style.display='none'; $('banner').style.display='none'; renderOb(); }
function renderOb(){
  obPhase='cards';
  const s=OB[obIdx];
  $('ob-step').innerHTML=`<span class="obicon">${s.i}</span><div class="obt">${s.t}</div><p class="obd">${s.d}</p>`;
  $('ob-dots').innerHTML=OB.map((_,i)=>`<i class="${i===obIdx?'on':''}"></i>`).join('');
  $('ob-btn').textContent='Next';
  $('ob-skip').style.display=''; $('ob-skip').textContent='Skip';
}
$('ob-btn').addEventListener('click',()=>{ sfx.tap(); buzz(10);
  if(obPhase==='name'){ confirmObName(); }
  else if(obPhase==='try'){ startPractice(); }
  else if(obIdx<OB.length-1){ obIdx++; renderOb(); }
  else showNameStep();
});
$('ob-skip').addEventListener('click',()=>{ sfx.tap();
  if(obPhase==='try'){ endOb(); }       // skip the practice round
  else { showNameStep(); }              // skip the rest of the cards
});
function showNameStep(){
  obPhase='name';
  const sugg=['TimeLord','ChronoKid','TickTock','SplitSecond','MsPrecise','SteadyHand'][Math.floor(Math.random()*6)];
  $('ob-step').innerHTML=`<span class="obicon">👋</span><div class="obt">What should we call you?</div>
    <p class="obd">Your name shows on leaderboards and share cards.<br>You can change it anytime in your profile.</p>
    <input class="obname" id="ob-name" maxlength="16" placeholder="${sugg}" value="${S.name!=='Player'?esc(S.name):''}" autocomplete="off" onkeydown="if(event.key==='Enter')document.getElementById('ob-btn').click()">`;
  $('ob-dots').innerHTML='';
  $('ob-btn').textContent='Next';
  $('ob-skip').style.display='none';
  setTimeout(()=>{ const i=$('ob-name'); if(i) i.focus(); },300);
}
function confirmObName(){
  const i=$('ob-name'), v=i?i.value.trim():'';
  if(v) S.name=v.slice(0,16);
  save();
  showTryStep();
}
function showTryStep(){
  obPhase='try';
  $('ob-step').innerHTML=`<span class="obicon">🎯</span><div class="obt">Want a quick practice?</div>
    <p class="obd">Try one round to get the feel for it — no pressure, and it won't count toward your stats.</p>`;
  $('ob-dots').innerHTML='';
  $('ob-btn').textContent='Now you try 🎯';
  $('ob-skip').style.display=''; $('ob-skip').textContent='Skip for now';
}
function endOb(){
  S.onboarded=true; save();
  $('onboard').classList.remove('active');
  $('tabbar').style.display='flex'; updateBanner(false);
  go('home');
  if(S.login.last!==todayStr()) setTimeout(claimLogin,600);
}
/* ---- practice round (a guided first game that doesn't count) ---- */
function startPractice(){
  S.onboarded=true; save();
  $('onboard').classList.remove('active');
  startGame('classic',{kind:'practice',target:3});
}
function finishPractice(actual,diff,score,rank){
  const s=session; session=null;
  const early=actual<s.target;
  const msg = diff<=0.4 ? 'Incredible — natural talent! 🎯'
            : diff<=1.2 ? "Nice — you've got the idea!"
            : "That's the idea — it gets easier, promise!";
  openSheet(`
    <div class="grab"></div>
    <div class="rankbig"><span class="remoji">${rank.emoji}</span><div class="rankname">Practice Round</div></div>
    <div class="nearmiss">${msg}</div>
    <div class="resrows">
      <div class="resrow"><span class="rl">Target</span><span class="rv">${s.target}.00 s</span></div>
      <div class="resrow"><span class="rl">You stopped at</span><span class="rv">${actual.toFixed(2)} s</span></div>
      <div class="resrow"><span class="rl">Off by</span><span class="rv" style="color:${diff<=0.5?'var(--good)':diff<=1?'var(--gold)':'var(--bad)'}">${early?'−':'+'}${fmtS(diff)} s</span></div>
    </div>
    <p class="coach">This one didn't count. Now play for real to start earning XP, ranks, and rewards!</p>
    <div class="sheetbtns"><button class="btn btn-grad" onclick="endPractice()">Start Playing 🚀</button></div>`);
  celebrate(70); sfx.ok(); buzz([15,25]);
}
function endPractice(){
  closeSheet();
  $('tabbar').style.display='flex'; updateBanner(false);
  go('home');
  if(S.login.last!==todayStr()) setTimeout(claimLogin,500);
}

/* ============ KEYBOARD (desktop) ============ */
window.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='Enter'){
    if(curScreen==='game' && !$('sheetwrap').classList.contains('open') && !$('modal').classList.contains('open') && !$('modal2').classList.contains('open') && !$('onboard').classList.contains('active')){
      e.preventDefault(); $('g-big').click();
    }
  }
  if(e.key==='Escape'){ closeModal(); closeModal2(); }
});

/* ============ INIT ============ */
function init(){
  applyLook();
  S.analytics.sessions++;
  setInterval(()=>{ if(!document.hidden){S.analytics.timeSec+=15; save()} },15000);
  ensureQuests();
  renderHome(); updateBanner(false);
  sizeFx();
  if(!S.onboarded){ startOnboarding(); }
  else if(S.login.last!==todayStr()){ setTimeout(claimLogin,650); }
  save();
}
init();
</script>
</body>
